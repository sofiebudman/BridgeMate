# ──────────────────────────────────────────────────────────────
#  BridgeMate – Nginx Reverse Proxy Configuration
# ──────────────────────────────────────────────────────────────
#
#  macOS (Homebrew):
#    Copy to  /opt/homebrew/etc/nginx/servers/bridgemate.conf
#    Then:    brew services restart nginx
#
#  Linux (Ubuntu/Debian):
#    Copy to  /etc/nginx/sites-available/bridgemate
#    Symlink: ln -s /etc/nginx/sites-available/bridgemate /etc/nginx/sites-enabled/
#    Then:    sudo nginx -t && sudo systemctl reload nginx
#
# ──────────────────────────────────────────────────────────────

upstream bridgemate_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen       8080 default_server;
    server_name  _;

    # ── Logging ────────────────────────────────────────────────
    access_log  /var/log/nginx/bridgemate_access.log;
    error_log   /var/log/nginx/bridgemate_error.log;

    # ── Request limits ─────────────────────────────────────────
    client_max_body_size 25M;   # Allow audio file uploads

    # ── Security headers ───────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header X-XSS-Protection      "1; mode=block"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static files (served directly by Nginx) ────────────────
    location /static/ {
        alias /Users/tim/Documents/bisv/src/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SSE streaming endpoint (special proxy settings) ────────
    location /api/chat {
        proxy_pass         http://bridgemate_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE-specific: disable buffering so tokens stream in real-time
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;  # LLM responses can take time
        chunked_transfer_encoding on;
    }

    # ── API endpoints ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://bridgemate_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout 120s;
    }

    # ── All other routes (Flask templates) ─────────────────────
    location / {
        proxy_pass         http://bridgemate_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }
}
