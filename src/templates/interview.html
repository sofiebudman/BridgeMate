<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Practice - Immigration Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --teal:      #2d6a5f;
            --teal-mid:  #3d8a7b;
            --teal-lt:   #e4f0ee;
            --teal-glow: rgba(45,106,95,0.15);
            --ink:       #111714;
            --mid:       #4a5550;
            --soft:      #8a9490;
            --bg:        #f2f0eb;
            --white:     #ffffff;
            --card:      #ffffff;
            --border:    #e2ddd6;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
        }

        /* ── Layout ───────────────────────────────── */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 820px;
            margin: 0 auto;
            padding: 0 1.5rem;
            overflow: hidden;
        }

        /* ── Header ───────────────────────────────– */
        .header {
            padding: 1.5rem 0 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-shrink: 0;
        }

        .header h1 {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: 1.35rem;
            color: var(--ink);
            letter-spacing: -0.01em;
        }

        .header-right {
            display: flex;
            gap: 0.75rem;
            flex-shrink: 0;
            margin-left: auto;
        }

        /* ── Interview Content ───────────────────── */
        .interview-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .interview-container::-webkit-scrollbar {
            width: 8px;
        }

        .interview-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .interview-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .interview-container::-webkit-scrollbar-thumb:hover {
            background: var(--soft);
        }

        .empty-state {
            text-align: center;
            color: var(--soft);
            padding: 2rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Messages ─────────────────────────────── */
        .message {
            max-width: 85%;
            min-width: 0;
            padding: 0.85rem 1.1rem;
            border-radius: 14px;
            font-size: 0.93rem;
            line-height: 1.65;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .message .message-content {
            margin: 0;
            font-size: inherit;
            line-height: inherit;
            background: none !important;
            border: none !important;
            padding: 0 !important;
            border-radius: 0 !important;
            max-width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        .message .message-content > *:first-child { margin-top: 0; }
        .message .message-content > *:last-child { margin-bottom: 0; }

        .message .message-content h1,
        .message .message-content h2,
        .message .message-content h3,
        .message .message-content h4 {
            margin: 0.35rem 0 0.5rem;
            line-height: 1.35;
            font-weight: 600;
            font-size: 1rem;
        }

        .message .message-content p {
            margin: 0.35rem 0;
        }

        .message .message-content ul,
        .message .message-content ol {
            margin: 0.35rem 0 0.35rem 1.2rem;
            padding: 0;
        }

        .message .message-content li {
            margin: 0.15rem 0;
        }

        .message .message-content code {
            font-family: 'SFMono-Regular', Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
            font-size: 0.86em;
            border-radius: 6px;
            padding: 0.08rem 0.35rem;
            background: rgba(17, 23, 20, 0.08);
        }

        .message .message-content pre {
            margin: 0.45rem 0;
            padding: 0.75rem 0.8rem;
            border-radius: 8px;
            overflow-x: auto;
            max-width: 100%;
            background: rgba(17, 23, 20, 0.06);
        }

        .message .message-content pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
        }

        .message .message-content a {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .user-message .message-content code,
        .user-message .message-content pre {
            background: rgba(255, 255, 255, 0.16);
        }

        .bot-message {
            background: var(--card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            color: var(--ink);
        }

        .user-message {
            background: var(--teal);
            color: #fff;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        /* ── Recording Indicator ───────────────────– */
        .recording-indicator {
            display: none;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #d73828;
            flex-shrink: 0;
            margin-bottom: 0.75rem;
        }

        .recording-indicator.show {
            display: flex;
        }

        .recording-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #d73828;
            border-radius: 50%;
            animation: pulse 1s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Status Message ───────────────────────– */
        .status-message {
            padding: 0.8rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            display: none;
            flex-shrink: 0;
            border-left: 4px solid;
            margin-bottom: 0.75rem;
        }

        .status-message.show {
            display: block;
        }

        .status-message.info {
            background: rgba(61, 138, 123, 0.12);
            color: var(--teal);
            border-left-color: var(--teal);
        }

        .status-message.error {
            background: rgba(255, 59, 48, 0.12);
            color: #d73828;
            border-left-color: #d73828;
        }

        .status-message.success {
            background: rgba(76, 175, 80, 0.12);
            color: #388e3c;
            border-left-color: #388e3c;
        }

        /* ── Input Area ───────────────────────────── */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 1rem 0 1.25rem;
            flex-shrink: 0;
        }

        .input-group {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 0.75rem;
        }

        .input-group textarea {
            flex: 1;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.93rem;
            color: var(--ink);
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
            min-height: 44px;
            max-height: 4rem;
            line-height: 1.5;
        }

        .input-group textarea::placeholder {
            color: var(--soft);
        }

        .input-group textarea:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }

        .input-group textarea:disabled {
            background: #f8f7f5;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .input-buttons {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        /* ── Buttons ───────────────────────────────– */
        .btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--teal);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--teal-mid);
            box-shadow: 0 4px 14px var(--teal-glow);
        }

        .btn-secondary {
            background: var(--card);
            color: var(--mid);
            border: 1.5px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: var(--teal);
            color: var(--teal);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.recording {
            background: #d73828;
            color: var(--white);
            animation: pulse-bg 1s ease-in-out infinite;
        }

        .btn.recording:hover:not(:disabled) {
            background: #b32817;
        }

        @keyframes pulse-bg {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 0 3px rgba(215, 56, 40, 0.2); }
        }

        .btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .btn-label {
            display: inline;
        }

        /* ── Responsive ───────────────────────────– */
        @media (max-width: 640px) {
            .container {
                padding: 0 1rem;
            }

            .header {
                padding: 1rem 0 0.75rem;
                gap: 0.5rem;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .interview-container {
                padding: 1rem 0;
            }

            .input-area {
                padding: 0.75rem 0 1rem;
            }

            .input-group {
                flex-direction: column;
                margin-bottom: 0.5rem;
            }

            .input-group textarea {
                width: 100%;
            }

            .input-buttons {
                width: 100%;
                gap: 0.5rem;
            }

            .message {
                max-width: min(90%, 480px);
            }

            .btn {
                font-size: 0.8rem;
                padding: 0.5rem 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Interview Practice</h1>
            <div class="header-right">
                <button id="backBtn" class="btn btn-secondary" title="Back to Chat">
                    ← Back to Chat
                </button>
            </div>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="status-message"></div>

        <!-- Interview Content -->
        <div class="interview-container" id="interviewContent">
            <div class="empty-state">
                Starting interview...
            </div>
        </div>

        <!-- Recording Indicator -->
        <div id="recordingIndicator" class="recording-indicator">
            <span class="recording-dot"></span>
            Recording… <span id="recordingTime">00:00</span>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-group">
                <textarea 
                    id="interviewInput" 
                    placeholder="Record your answer to submit..."
                    disabled
                ></textarea>
                <button id="recordInterviewBtn" class="btn btn-primary" title="Record your answer" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M12 1v6m0 6v6"></path>
                        <ellipse cx="12" cy="12" rx="8" ry="11"></ellipse>
                    </svg>
                    <span class="btn-label">Record</span>
                </button>
            </div>
            <div class="input-buttons">
                <button id="submitBtn" class="btn btn-primary" title="Submit answer">
                    <span class="btn-label">Submit</span>
                </button>
                <button id="endInterviewBtn" class="btn btn-secondary">
                    <span class="btn-label">End Interview</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="{{ url_for('static', filename='interview.js') }}"></script>
    <script>
        // Initialize interview page state
        document.addEventListener('DOMContentLoaded', () => {
            // Get user context from localStorage
            const userContext = {
                userName: localStorage.getItem('userName') || 'User',
                userLanguage: localStorage.getItem('userLanguage') || 'en',
                userCountry: localStorage.getItem('userCountry') || 'US',
            };

            // Back button functionality
            document.getElementById('backBtn').addEventListener('click', () => {
                if (confirm('Are you sure you want to end the interview and return to chat?')) {
                    sessionStorage.removeItem('interviewOpeningQuestion');
                    sessionStorage.removeItem('interviewStarted');
                    sessionStorage.removeItem('interviewTopic');
                    // Return to chat page with preserved context
                    const lang = userContext.userLanguage;
                    window.location.href = `/chat?lang=${lang}&name=${encodeURIComponent(userContext.userName)}&country=${userContext.userCountry}`;
                }
            });

            // Submit button functionality
            document.getElementById('submitBtn').addEventListener('click', submitInterviewAnswer);
        });
    </script>
</body>
</html>
